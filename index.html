<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<title>KÁOSZ MODE</title>
<style>
  body {
    margin: 0;
    font-family: Arial;
    overflow: hidden;
    transition: all 0.1s;
  }

  #btn {
    position: absolute;
    padding: 20px;
    font-size: 18px;
    cursor: pointer;
  }

  #text {
    position: absolute;
    top: 10px;
    width: 100%;
    text-align: center;
    font-size: 22px;
  }
</style>
</head>

<body>

<div id="text">KÁOSZ AKTIVÁLVA</div>
<button id="btn">NE NYOMD</button>

<script>
const btn = document.getElementById("btn");
const text = document.getElementById("text");

let clicks = 0;

function rand(max){ return Math.random() * max; }

function chaos() {
  // háttér szín
  document.body.style.background =
    `rgb(${rand(255)},${rand(255)},${rand(255)})`;

  // gomb ugrál
  btn.style.left = rand(window.innerWidth - 100) + "px";
  btn.style.top = rand(window.innerHeight - 100) + "px";

  // szöveg random
  const msgs = [
    "MI TÖRTÉNIK?",
    "EZ NEM NORMLÁIS",
    "NE ÁLLJ LE",
    "A RENDSZER FIGYEL",
    "KÁOSZ SZINT: " + clicks
  ];

  text.innerText = msgs[Math.floor(rand(msgs.length))];

  // néha forgatás
  document.body.style.transform =
    `rotate(${rand(6)-3}deg)`;
}

// kattintás
btn.addEventListener("click", () => {
  clicks++;
  chaos();

  // gomb gyorsul
  btn.style.transition = "0.05s";
});

// folyamatos káosz
setInterval(chaos, 800);
</script>

</body>
</html>
